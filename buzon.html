<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Experiencia del Cliente | Laura Soto</title>

<link rel="stylesheet" href="style.css">
<header class="navbar navbar-light">

    <div class="logo">
        Laura Soto
    </div>

    <button class="menu-toggle" onclick="toggleMenu()">
      ☰
    </button>

    <nav id="menu">
        <a href="index.html">Inicio</a>
        <a href="propiedades.html">Propiedades</a>
        <a href="blog.html">Blog</a>
        <a href="contacto.html">Contacto</a>
        <a href="legal.html">Legal</a>
        <a href="buzon.html">Atención al Cliente</a>
    </nav>

</header>

<section class="featured" style="padding-top:180px;">

    <div class="section-header">

        <p>
            Atención al Cliente
        </p>

        <h2>
            Experiencia del Cliente
        </h2>

    </div>

    <div
        style="
        max-width:800px;
        margin:auto;
        background:white;
        padding:50px;
        border-radius:30px;
        box-shadow:0 15px 40px rgba(0,0,0,.08);
        ">

        <form id="experienciaForm">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required
                style="
                width:100%;
                padding:18px;
                margin-bottom:20px;
                border:1px solid #ddd;
                border-radius:12px;
                "
            >

            <input
                type="email"
                id="correo"
                placeholder="Correo electrónico"
                required
                style="
                width:100%;
                padding:18px;
                margin-bottom:20px;
                border:1px solid #ddd;
                border-radius:12px;
                "
            >

            <input
                type="tel"
                id="telefono"
                placeholder="Teléfono"
                style="
                width:100%;
                padding:18px;
                margin-bottom:20px;
                border:1px solid #ddd;
                border-radius:12px;
                "
            >

            <select
                id="tipo"
                style="
                width:100%;
                padding:18px;
                margin-bottom:20px;
                border:1px solid #ddd;
                border-radius:12px;
                "
            >

                <option value="Queja">
                    Queja
                </option>

                <option value="Sugerencia">
                    Sugerencia
                </option>

                <option value="Comentario">
                    Comentario
                </option>

                <option value="Felicitación">
                    Felicitación
                </option>

            </select>

            <textarea
                id="mensaje"
                placeholder="Cuéntanos tu experiencia..."
                required
                style="
                width:100%;
                height:220px;
                padding:18px;
                margin-bottom:20px;
                border:1px solid #ddd;
                border-radius:12px;
                resize:none;
                "
            ></textarea>

            <button
                type="submit"
                style="
                width:100%;
                padding:18px;
                background:#2b2b2b;
                color:white;
                border:none;
                border-radius:15px;
                cursor:pointer;
                font-size:16px;
                font-weight:600;
                "
            >

                Enviar comentario

            </button>

        </form>

    </div>

</section>

<script>

    document
    .getElementById("experienciaForm")
    .addEventListener("submit", function(e){

        e.preventDefault();

        const nombre =
        document.getElementById("nombre").value;

        const correo =
        document.getElementById("correo").value;

        const telefono =
        document.getElementById("telefono").value;

        const tipo =
        document.getElementById("tipo").value;

        const mensaje =
        document.getElementById("mensaje").value;

        const texto =

`EXPERIENCIA DEL CLIENTE

Tipo: ${tipo}

Nombre: ${nombre}

Correo: ${correo}

Teléfono: ${telefono}

Mensaje:
${mensaje}`;

        const whatsapp =
        `https://wa.me/522292949468?text=${encodeURIComponent(texto)}`;

        window.open(whatsapp, "_blank");

    });

</script>

<script>
    function toggleMenu(){
        const menu =
        document.getElementById("menu");

        const boton =
        document.querySelector(".menu-toggle");

        menu.classList.toggle("active");

        if(menu.classList.contains("active")){

        boton.innerHTML = "✕";

        }else{

        boton.innerHTML = "☰";

        }

    }
</script>
