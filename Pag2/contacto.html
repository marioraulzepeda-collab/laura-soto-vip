<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | Laura Soto</title>

    <link rel="stylesheet" href="style2.css">

</head>

<body>

    <header class="navbar navbar-light">

        <div class="logo">
            Laura Soto
        </div>

        <button class="menu-toggle" onclick="toggleMenu()">
          ☰
        </button>

        <nav id="menu">
            <a href="index.html">Inicio</a>
            <a href="propiedades.html">Propiedades</a>
            <a href="blog.html">Blog</a>
            <a href="contacto.html">Contacto</a>
            <a href="legal.html">Legal</a>
            <a href="buzon.html">Atención al Cliente</a>
        </nav>

    </header>

    <section class="featured" style="padding-top:180px;">

        <div class="section-header">

            <p>Contáctanos</p>

            <h2>Agenda una asesoría</h2>

        </div>

        <div
            style="
            max-width:700px;
            margin:auto;
            background:white;
            padding:50px;
            border-radius:30px;
            box-shadow:0 15px 40px rgba(0,0,0,.08);
            ">

            <form id="contactForm">

                <input
                    type="text"
                    id="nombre"
                    placeholder="Nombre"
                    required
                    style="
                    width:100%;
                    padding:18px;
                    margin-bottom:20px;
                    border:1px solid #ddd;
                    border-radius:12px;
                    "
                >

                <input
                    type="email"
                    id="correo"
                    placeholder="Correo electrónico"
                    required
                    style="
                    width:100%;
                    padding:18px;
                    margin-bottom:20px;
                    border:1px solid #ddd;
                    border-radius:12px;
                    "
                >

                <input
                    type="tel"
                    id="telefono"
                    placeholder="Teléfono"
                    required
                    style="
                    width:100%;
                    padding:18px;
                    margin-bottom:20px;
                    border:1px solid #ddd;
                    border-radius:12px;
                    "
                >

                <textarea
                    id="mensaje"
                    placeholder="Cuéntanos cómo podemos ayudarte..."
                    required
                    style="
                    width:100%;
                    height:180px;
                    padding:18px;
                    margin-bottom:20px;
                    border:1px solid #ddd;
                    border-radius:12px;
                    resize:none;
                    "
                ></textarea>

                <button
                    type="submit"
                    style="
                    width:100%;
                    padding:18px;
                    background:#2b2b2b;
                    color:white;
                    border:none;
                    border-radius:15px;
                    cursor:pointer;
                    font-size:16px;
                    font-weight:600;
                    "
                >

                    Solicitar asesoría

                </button>

            </form>

        </div>

    </section>

    <script>

        document
        .getElementById("contactForm")
        .addEventListener("submit", function(e){

            e.preventDefault();

            const nombre =
            document.getElementById("nombre").value;

            const correo =
            document.getElementById("correo").value;

            const telefono =
            document.getElementById("telefono").value;

            const mensaje =
            document.getElementById("mensaje").value;

            const texto =
`Hola Laura Soto.

Nombre: ${nombre}

Correo: ${correo}

Teléfono: ${telefono}

Mensaje:
${mensaje}`;
            const whatsapp =
            `https://wa.me/522292949468?text=${encodeURIComponent(texto)}`;

            window.open(whatsapp, "_blank");

        });

    </script>


  <script>
        function toggleMenu(){
        const menu =
        document.getElementById("menu");

        const boton =
        document.querySelector(".menu-toggle");

        menu.classList.toggle("active");

        if(menu.classList.contains("active")){

            boton.innerHTML = "✕";

        }else{

            boton.innerHTML = "☰";

        }

        }
  </script>
</body>

</html>
